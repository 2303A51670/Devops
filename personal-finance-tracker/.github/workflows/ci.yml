name: CI - Integration Testing with Database

on:
  push:
  pull_request:

jobs:
  integration-tests:
    runs-on: ubuntu-latest

    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017

    env:
      MONGO_URI: mongodb://localhost:27017/pft_ci

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install
      - run: node src/migrate.js
      - run: npx jest tests/integration.test.js